<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Information</title>
</head>
<style>
    body {
        display:flexbox;
        flex-direction: column;
        align-items: center;
        text-align: center;
        font-family: Arial, sans-serif;
        margin: 20px;
        background-image: url(/static/background/bigdatebackground.jpg);
        background-size: cover;
    }
    h1 {
        justify-content: center;
        font-size: 36px;    
        margin-bottom: 10px;
        color: white;
        text-shadow: 2px 2px 4px #000000;
        font-family: 'Times New Roman', Times, serif;
    }
    p {
        font-size: 18px;
        margin-bottom: 20px;
        color: white;
    }
    /* the info-box is in the middle */
    /*each information is a box*/

    #info-box {
        font-family: 'Times New Roman', Times, serif;
        border: 2px solid #000;
        padding: 20px;
        margin: 20px auto;
        width: 1200px;
        height: 450px;
        background-color: rgba(255, 255, 255, 0.199);
        color: black;
        overflow-y: auto;
        border-radius: 20px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    .info-item {
        background: rgba(255,255,255,0.8);
        border-radius: 12px;
        margin-bottom: 16px;
        padding: 16px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
    }
    .info-time {
        font-size: 14px;
        color: #555;
        margin-bottom: 8px;
    }
    .info-message {
        font-size: 18px;
        color: #222;
        line-height: 1.4;
    }
</style>
<body>
    <h1>Information</h1>
    <p>If we have new information we will inform here</p>
    <!-- here we will have a box that can be that have display the information that we i will post on that-->
    <div id="info-box">
        <p>No new information at the moment.</p>
    </div>
    <br>

    <script>
        // Example of how to update the information box dynamically
        function updateInfoBox(newInfo) {
            const infoBox = document.getElementById('info-box');
            const newParagraph = document.createElement('p');
            newParagraph.textContent = newInfo;
            infoBox.appendChild(newParagraph);
        }

        // Simulate adding new information after 5 seconds
        setTimeout(() => {
            updateInfoBox('New update: The system will undergo maintenance on Saturday.');
        }, 5000);

        function updateInfoBox(newInfo) {
            const infoBox = document.getElementById('info-box');
            const infoItem = document.createElement('div');
            infoItem.className = 'info-item';

            const timeElem = document.createElement('div');
            timeElem.className = 'info-time';
            timeElem.textContent = new Date().toLocaleString();

            const messageElem = document.createElement('div');
            messageElem.className = 'info-message';
            messageElem.textContent = newInfo;

            infoItem.appendChild(timeElem);
            infoItem.appendChild(messageElem);

            infoBox.appendChild(infoItem);
        }
        // we will have the function that can be adjust that information , add info first for text, for the admin login
        
        
        // the user just can seen the information  
    </script>
</body>
</html>
